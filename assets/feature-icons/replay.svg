<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .arc { fill: none; stroke: #e8b44a; stroke-width: 3; stroke-linecap: round; }
    .arrow { fill: #e8b44a; }
    .checkmark { fill: none; stroke: #4ca8a8; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .dot { fill: #e06530; }
  </style>
  <!-- Three-quarter clockwise arc forming the replay loop -->
  <path class="arc" d="M 36 24 A 12 12 0 1 1 24 12"/>
  <!-- Arrowhead at the start of the arc -->
  <polygon class="arrow" points="20,6 28,12 20,18"/>
  <!-- Inner deterministic check (verifies match=true semantics) -->
  <polyline class="checkmark" points="18,26 22,30 30,22"/>
  <!-- Anchor dot at center -->
  <circle class="dot" cx="24" cy="24" r="2"/>
</svg>
