# Mars Genesis Simulation Configuration
# Copy to config.yaml and customize

leaders:
  - name: "Aria Chen"
    archetype: "The Visionary"
    colony: "Ares Horizon"
    hexaco:
      openness: 0.95
      conscientiousness: 0.35
      extraversion: 0.85
      agreeableness: 0.55
      emotionality: 0.30
      honestyHumility: 0.65
    instructions: "You believe in bold expansion. Accept calculated risks. Favor higher upside."

  - name: "Dietrich Voss"
    archetype: "The Engineer"
    colony: "Meridian Base"
    hexaco:
      openness: 0.25
      conscientiousness: 0.97
      extraversion: 0.30
      agreeableness: 0.45
      emotionality: 0.70
      honestyHumility: 0.90
    instructions: "You believe in engineering discipline. Demand data. Favor lower risk."

timeline:
  turns: 12
  startYear: 2035
  # Years per turn. Length must match turns count.
  schedule: [2035, 2037, 2040, 2043, 2046, 2049, 2053, 2058, 2063, 2068, 2075, 2085]

seed: 950

# Custom events injected at specific turns.
# The LLM incorporates these organically into the crisis response.
# Tagged as "user-injected" in the output.
